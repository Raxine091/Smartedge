<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Director Profile | SmartEdge</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
            background: #0f172a;
        }
        
        .profile-container { 
            max-width: 500px; 
            width: 90%;
            background: rgba(30, 41, 59, 0.6); 
            backdrop-filter: blur(15px);
            padding: 40px; 
            border-radius: 20px; 
            text-align: center; 
            color: white; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        
        .profile-img { 
            width: 140px; 
            height: 140px; 
            border-radius: 50%; 
            background: #334155; 
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            border: 4px solid var(--primary-blue, #38bdf8);
        }
        
        h1 { margin-bottom: 5px; }
        .reg-number { color: #94a3b8; font-size: 0.9em; margin-bottom: 20px; }
        
        .back-btn { 
            display: inline-block; 
            margin-top: 25px; 
            color: #38bdf8; 
            text-decoration: none; 
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-img">👤</div>
        <h1>Vivian Akinyi</h1>
        <p class="reg-number"><strong>Role:</strong> Legal Director</p>
        <p><strong>&copy SmartEdge Electronics.</strong> est. 2026</p>
        <a href="../about.html" class="back-btn">← Back to Board</a>
    </div>
</body>
</html>
