<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | SmartEdge</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body class="cart-page">
    <nav class="navbar">
        <div class="logo">⚡ SmartEdge</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="cart.html" class="active">Cart (<span id="cart-count">0</span>)</a></li>
        </ul>
    </nav>

    <main class="cart-wrapper">
    <header class="cart-header">
        <h1>Shopping <span>Cart</span></h1>
        <p id="cart-subtitle">0 items in your cart</p>
    </header>

    <div class="cart-grid">
        
        <div class="cart-items-column">
            <div id="cart-items-container">
                </div>
            <button id="clear-cart-btn" class="text-btn-danger">Clear Cart</button>
        </div>

        <aside class="order-summary-card">
            <h2>Order Summary</h2>
            <div id="summary-details">
                </div>
            <div class="summary-total">
                <span>Total</span>
                <span id="grand-total">KES 0</span>
            </div>
            <button class="checkout-btn">Proceed to Checkout →</button>
        </aside>

    </div>
</main>

    <script src="cart.js"></script>
</body>
</html>
