<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartEdge | Checkout</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .checkout-flex { display: flex; gap: 40px; padding: 50px 8%; }
        .form-group { margin-bottom: 15px; }
        input[type="text"], input[type="email"] { width: 100%; padding: 10px; margin-top: 5px; }
        .summary-box { background: #eee; padding: 20px; border-radius: 8px; flex: 1; }
        form { flex: 2; }
    </style>
</head>
<body>
    <div class="checkout-flex">
        <form id="checkout-form">
            <h2>Shipping Details</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Shipping Address</label>
                <input type="text" required placeholder="123 Street, Nairobi">
            </div>
            <button type="submit" class="btn-hero" style="width:100%; border:none; cursor:pointer;">Place Order</button>
        </form>

        <div class="summary-box">
            <h3>Order Summary</h3>
            <div id="order-summary-list"></div>
            <hr>
            <h4>Total: $<span id="checkout-total">0</span></h4>
        </div>
    </div>

    <script>
        // Quick script for checkout summary
        const cart = JSON.parse(localStorage.getItem('smartedge_cart')) || [];
        const total = cart.reduce((acc, item) => acc + (item.price * item.quantity), 0);
        document.getElementById('checkout-total').innerText = total;

        document.getElementById('checkout-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Thank you for your order! Your SmartEdge electronics are on the way.");
            localStorage.removeItem('smartedge_cart'); // Clear cart after "purchase"
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
